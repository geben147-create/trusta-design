<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와디즈형 홈페이지 문구 초안 10종</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1a1c20; --sub:#5b616e;
    --line:#e6e8ec; --point:#3a6ff7; --point2:#0c1b3a;
    --good:#0a8754; --warn:#d9480f; --warnbg:#fff4ec; --goodbg:#eafaf2;
    --star:#f5a623; --chip:#eef2ff;
    --radius:16px; --shadow:0 6px 24px rgba(20,30,60,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:28px 18px 80px}
  header.top{text-align:center;padding:18px 0 8px}
  header.top h1{font-size:26px;letter-spacing:-.5px}
  header.top p{color:var(--sub);font-size:14px;margin-top:6px}

  /* 탭 */
  .tabs{position:sticky;top:0;z-index:30;background:var(--bg);
    padding:12px 0 10px;margin-top:10px}
  .tabs-inner{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--sub);padding:9px 14px;border-radius:999px;font-size:13px;
    cursor:pointer;white-space:nowrap;font-weight:600;transition:.15s}
  .tab:hover{border-color:var(--point);color:var(--point)}
  .tab.active{background:var(--point2);color:#fff;border-color:var(--point2)}
  .tab.guide.active{background:var(--good);border-color:var(--good)}

  .panel{display:none;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
  .biz-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .rank{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:var(--point2);
    color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .biz-head h2{font-size:21px;letter-spacing:-.4px}
  .biz-head .one{color:var(--sub);font-size:14px;margin-top:3px}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{background:var(--chip);color:var(--point);font-size:12px;font-weight:700;
    padding:5px 11px;border-radius:999px}
  .chip.gray{background:#f0f1f4;color:var(--sub)}
  .stars{color:var(--star);letter-spacing:1px;font-size:13px}

  .rev{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
  .rev .box{flex:1;min-width:150px;background:#f8f9fb;border:1px solid var(--line);
    border-radius:12px;padding:13px 15px}
  .rev .box .lab{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.3px}
  .rev .box .val{font-size:16px;font-weight:800;margin-top:3px}
  .rev .box.early .val{color:var(--warn)}
  .rev .box.stable .val{color:var(--good)}
  .rev .box.ceil .val{color:var(--point)}

  .sec{margin-top:22px}
  .sec h3{font-size:13px;color:var(--point);font-weight:800;letter-spacing:.5px;
    text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .sec h3 .num{background:var(--point);color:#fff;width:20px;height:20px;border-radius:6px;
    font-size:11px;display:inline-flex;align-items:center;justify-content:center}

  .headlines{display:flex;flex-direction:column;gap:8px}
  .headlines .h{background:linear-gradient(0deg,#fafbff,#fff);border:1px solid var(--line);
    border-left:4px solid var(--point);border-radius:10px;padding:12px 14px;font-weight:700;font-size:15.5px}
  .headlines .h span{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:3px}

  .block{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .block .bt{background:#f8f9fb;padding:9px 14px;font-weight:800;font-size:12.5px;
    color:var(--point2);display:flex;justify-content:space-between;align-items:center}
  .block .bt em{font-style:normal;color:var(--sub);font-weight:600;font-size:11px}
  .block .bb{padding:13px 15px;font-size:14.5px}
  .block .bb ul{margin:6px 0 0 18px}
  .block .bb li{margin-bottom:4px}
  .ev-tag{display:inline-block;background:var(--goodbg);color:var(--good);font-size:11px;
    font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:8px}

  .faq .q{font-weight:700;font-size:14px;margin-top:8px}
  .faq .a{color:var(--sub);font-size:13.5px}
  .price{background:var(--point2);color:#fff;border-radius:12px;padding:16px 18px;font-size:15px}
  .price b{color:#ffd966}
  .cta{background:var(--point);color:#fff;text-align:center;border-radius:12px;
    padding:15px;font-weight:800;font-size:16px;margin-top:10px}

  .warnbox{background:var(--warnbg);border:1px solid #ffd5bd;border-radius:12px;padding:14px 16px;
    font-size:13.5px;color:#8a3b13;margin-top:14px}
  .goodbox{background:var(--goodbg);border:1px solid #b8ecd2;border-radius:12px;padding:14px 16px;
    font-size:13.5px;color:#0a5c3b}

  /* 가이드 탭 */
  .guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .guide-grid .g{background:#f8f9fb;border:1px solid var(--line);border-radius:12px;padding:14px}
  .guide-grid .g h4{font-size:14px;margin-bottom:6px;color:var(--point2)}
  .guide-grid .g p{font-size:13px;color:var(--sub)}
  table.rev-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  table.rev-table th,table.rev-table td{border:1px solid var(--line);padding:8px 10px;text-align:center}
  table.rev-table th{background:#f0f1f4;font-size:12px}
  table.rev-table td.name{text-align:left;font-weight:700}
  table.rev-table .e{color:var(--warn);font-weight:700}
  table.rev-table .s{color:var(--good);font-weight:700}
  .foot{text-align:center;color:var(--sub);font-size:12px;margin-top:30px;line-height:1.8}
  @media(max-width:640px){.guide-grid{grid-template-columns:1fr}.wrap{padding:18px 12px 70px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>와디즈형 홈페이지 문구 초안 · 10종</h1>
    <p>저관여 · 비대면 · 정신적 부담 최소 · 고수익(패시브/자동화) 기준 정렬 &nbsp;|&nbsp; 와디즈 8블록 카피 체계 적용</p>
  </header>

  <nav class="tabs">
    <div class="tabs-inner" id="tabbar"></div>
  </nav>

  <div id="panels"></div>

  <p class="foot">
    ⚠️ 모든 수치는 <b>보수적 추정 초안</b>이며 실제 수익을 보장하지 않습니다.<br>

  </p>

    <p style="color:#5b616e;font-size:14px;margin-top:6px">와디즈의 '117억·월 2억' 같은 숫자는 대부분 <b>펀딩 총모금액(순익 아님)</b>이거나 <b>상위 0.1% 누적 실적</b>입니다. 그대로 따라 쓰면 거짓·과장광고입니다. 아래 8가지로 증거를 '대체'하세요.</p>
    <div class="guide-grid" style="margin-top:14px">${evCards}</div>
    <div class="warnbox"><b>⚠️ 절대 쓰면 안 되는 표현(광고법 위반)</b><ul style="margin:8px 0 0 18px">${fb}</ul></div>
  </div>
  <div class="card">
    <h2 style="font-size:20px">💰 현실적 수익 추정 (보수적 초안)</h2>
    <p style="color:#5b616e;font-size:14px;margin-top:6px">대부분 초기 6개월은 0에 가깝습니다. 건강한 1년차 목표는 <b>월 100~500만원</b>이며, '월 2억'은 극소수 상위 케이스입니다.</p>
    <table class="rev-table">
      <tr><th>#</th><th>사업</th><th>초기(0~6개월)</th><th>안정기(6~18개월)</th><th>비고</th></tr>
      ${revRows}
    </table>
    <div class="goodbox" style="margin-top:14px">✅ <b>추천 시작 순서</b> — 자본·시간이 적다면 1·2·4번(완전 패시브), 천장을 노린다면 6·10번(MRR 누적형), 보유 자동화 자산을 살리려면 9·10번부터.</div>
  </div>`;
panels.appendChild(gPanel);

// 사업 탭들
businesses.forEach(b=>{
  const t=document.createElement('button');
  t.className='tab';t.textContent=`${b.rank}. ${b.name}`;
  t.onclick=()=>activate('biz'+b.rank);
  tabbar.appendChild(t);

  const p=document.createElement('div');
  p.className='panel';p.id='panel-biz'+b.rank;
  const feats=b.feat.map(f=>`<li>${f}</li>`).join('');
  const hls=b.hl.map((h,i)=>`<div class="h"><span>헤드라인 ${String.fromCharCode(65+i)}안</span>${h}</div>`).join('');
  const faqs=b.faq.map(f=>`<div class="q">Q. ${f[0]}</div><div class="a">A. ${f[1]}</div>`).join('');
  const blkContent={
    Hook:b.hook,Agitation:b.agi,Solution:b.sol,
    Feature:`<ul>${feats}</ul>`,
    Evidence:`<span class="ev-tag">실적 0 신규 사업자용</span><br>${b.ev}`,
    FAQ:`<div class="faq">${faqs}</div>`,
    Price:`<div class="price">${b.price}</div>`,
    CTA:`<div class="cta">${b.cta}</div>`
  };
  const blocks=BLK.map((bk,i)=>`
    <div class="block">
      <div class="bt"><span><span style="color:#3a6ff7">${i+1}.</span> ${bk[0]}</span><em>${bk[1]}</em></div>
      <div class="bb">${blkContent[bk[0]]}</div>
    </div>`).join('');

  p.innerHTML=`
    <div class="card">
      <div class="biz-head">
        <div class="rank">${b.rank}</div>
        <div style="flex:1;min-width:200px">
          <h2>${b.name}</h2>
          <div class="one">${b.one}</div>
        </div>
      </div>
      <div class="meta">
        <span class="chip">🎯 ${b.target}</span>
        <span class="chip gray">저관여·자동화 <span class="stars">${stars(b.low)}</span></span>
        <span class="chip gray">수익잠재 <span class="stars">${stars(b.rev)}</span></span>
      </div>
      <div class="rev">
        <div class="box early"><div class="lab">초기 월수익(0~6개월)</div><div class="val">${b.re.e}</div></div>
        <div class="box stable"><div class="lab">안정기(6~18개월)</div><div class="val">${b.re.s}</div></div>
        <div class="box ceil"><div class="lab">천장(상위 케이스)</div><div class="val">${b.re.c}</div></div>
      </div>
      <div style="font-size:12px;color:#5b616e;margin-top:8px">💳 과금 구조: ${b.re.u}</div>
    </div>
    <div class="card">
      <div class="sec"><h3><span class="num">A</span>메인 후킹 헤드라인 (3안)</h3>${hls}</div>
      <div class="sec"><h3><span class="num">B</span>와디즈 8블록 카피 초안</h3>${blocks}</div>
    </div>`;
  panels.appendChild(p);
});

function activate(id){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const idx = id==='guide'?0:parseInt(id.replace('biz',''));
  tabbar.children[idx].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
